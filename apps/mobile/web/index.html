<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FIXI Mobile</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #08111f;
        color: #e2e8f0;
      }
      body {
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .card {
        width: min(560px, 100%);
        border: 1px solid rgba(125, 211, 252, 0.16);
        border-radius: 24px;
        padding: 28px;
        background: rgba(15, 23, 42, 0.92);
        box-shadow: 0 18px 60px rgba(0, 0, 0, 0.35);
      }
      h1 {
        margin: 0 0 12px;
        font-size: 36px;
        line-height: 1.05;
        letter-spacing: -0.04em;
        color: #fff;
      }
      p {
        margin: 0;
        font-size: 16px;
        line-height: 1.6;
        color: #cbd5e1;
      }
      .meta {
        margin-top: 18px;
        padding: 14px 16px;
        border-radius: 16px;
        background: rgba(8, 17, 31, 0.72);
        border: 1px solid rgba(125, 211, 252, 0.12);
        color: #7dd3fc;
        font-size: 13px;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>FIXI Mobile</h1>
      <p>
        Esta app Android carga el frontend real del taller mediante Capacitor. Si no ves
        la interfaz principal, revisa la variable <strong>NEXT_PUBLIC_WEB_ADMIN_URL</strong>.
      </p>
      <div class="meta">Wrapper nativo sobre el frontend existente</div>
    </main>
  </body>
</html>
