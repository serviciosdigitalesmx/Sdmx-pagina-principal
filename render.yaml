services:
  - type: web
    name: sdmx-backend-api
    env: node
    plan: starter
    rootDir: apps/backend-api
    buildCommand: npm install && npm run build
    startCommand: npm start
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 10000
      - key: TRUST_PROXY
        value: 1
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: APP_URL
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: MERCADOPAGO_ACCESS_TOKEN
        sync: false
      - key: MP_WEBHOOK_SECRET
        sync: false
      - key: TRIAL_DAYS
        sync: false
      - key: MASTER_TENANT_SLUG
        sync: false
      - key: MASTER_ACCOUNT_EMAIL
        sync: false
      - key: ORDER_DOCUMENTS_BUCKET
        sync: false
      - key: EVIDENCE_IMAGES_BUCKET
        sync: false
